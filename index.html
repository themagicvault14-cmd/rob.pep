    { q: "The train now at the platform 6 is the 10:45 for London:", o: ["Sitting", "Standing", "Waiting", "Remaining"], a: 1, exp: "In UK English, trains 'stand' at a platform." },
    { q: "Unfortunately, it's now 11:00 O'clock and so there is a.... of 15mins:", o: ["Waiting", "Lateness", "Space", "Delay"], a: 3, exp: "If a train is late, there is a delay." },
    { q: "The train at platform 14 cannot leave because there's a power...:", o: ["Failure", "Miss", "Falling", "Missing"], a: 0, exp: "A 'power failure' is the standard term for a blackout." },
    { q: "Severe storms means some lines are now....", o: ["Waterlogged", "Waterproof", "Water soaked", "Water fall"], a: 0, exp: "Waterlogged means saturated or filled with water." },
    { q: "The restaurant in the main .... is now open:", o: ["Concord", "Conduit", "Concourse", "Condition"], a: 2, exp: "A concourse is a large open area inside a station or airport." },
    { q: "Mistakes should never...", o: ["Recur", "Retake", "Repeat", "Refer"], a: 0, exp: "To recur means to happen again." },
    { q: "The zip discs in the office is running dangerously low:", o: ["Share", "State", "Stock", "Practice"], a: 2, exp: "When you are low on supplies, your 'stock' is low." },
    { q: "I don't think I'll beat him. I am out of ....", o: ["Fitness", "Game", "Play", "Practice"], a: 3, exp: "Being 'out of practice' means you aren't performing well because you haven't done it lately." }
]
};

let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
    mode: null, course: null, index: 0, answers: {}, endTime: null, shuffled: []
};

function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

function toggleTheme() {
    const isDark = document.body.classList.toggle("dark");
    document.body.classList.toggle("light", !isDark);
    document.getElementById('theme-btn').innerHTML = isDark ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
}

function start(mode) {
    state.mode = mode;
    state.course = null;
    save();
    render();
}

function selectCourse(c) {
    state.course = c;
    state.index = 0;
    state.answers = {};
    // Create a copy of the questions for this session
    state.shuffled = [...QUESTIONS_DATA[c]];
    
    if(state.mode === 'exam') {
        // Set a bold 1-hour countdown for all courses
        const examDuration = 3600000; 
        state.endTime = Date.now() + examDuration; 
    }
    
    save();
    render();
}

function goHome() {
    state = { mode: null, course: null, index: 0, answers: {}, endTime: null, shuffled: [] };
    save();
    render();
}

function answer(idx) {
    if (state.mode === 'learning' && state.answers[state.index] !== undefined) return;
    state.answers[state.index] = idx;
    save();
    render();
}

function finish() {
    let score = 0;
    state.shuffled.forEach((q, i) => { if(state.answers[i] === q.a) score++; });
    let percent = Math.round((score / state.shuffled.length) * 100);
    let msg = percent >= 75 ? "Exceptional Performance!" : percent >= 50 ? "Good work, you passed!" : "Keep studying, improve needed.";

    const root = document.getElementById('app-root');
    root.innerHTML = `
        <div class="card">
            <h2 style="text-align:center; font-weight:800; letter-spacing:-1px;">${msg}</h2>
            <h1 style="text-align:center; color:var(--purple); font-size:72px; font-weight:900; margin:25px 0; letter-spacing:-3px; text-shadow: 0 0 20px var(--purple-glow);">${percent}%</h1>
            <p style="text-align:center; margin-bottom:25px; font-weight:600; color:var(--muted)">You achieved <b>${score}</b> correct out of <b>${state.shuffled.length}</b></p>
            <div class="review-scroll">
                ${state.shuffled.map((q, i) => `
                    <div style="padding:20px; background:var(--accent); border-radius:18px; margin-bottom:15px; border: 1px solid rgba(255,255,255,0.02)">
                        <p style="font-weight:700; margin-bottom:8px"><b>${i+1}. ${q.q}</b></p>
                        <p style="color:${state.answers[i] === q.a ? 'var(--green)' : 'var(--red)'}; font-weight:600">
                            Result: ${state.answers[i] !== undefined ? q.o[state.answers[i]] : '<span style="color:var(--muted)">Skipped</span>'}
                        </p>
                        ${state.answers[i] !== q.a ? `<p style="color:var(--green); font-weight:600">Correct: ${q.o[q.a]}</p>` : ''}
                    </div>
                `).join('')}
            </div>
            <button class="btn" style="width:100%; font-size:18px" onclick="goHome()">Back to Main Menu</button>
        </div>
    `;
    if(percent >= 50) runConfetti();
}

function render() {
    const root = document.getElementById('app-root');
    
    if (!state.mode) {
        root.innerHTML = `
            <div class="home-grid" style="animation:fadeIn 0.8s ease">
                <div class="home-box" onclick="start('learning')"><i class="fa-solid fa-graduation-cap"></i><h3>Learning Mode</h3><p>Study with Insights</p></div>
                <div class="home-box" onclick="start('exam')"><i class="fa-solid fa-stopwatch-20"></i><h3>Exam Mode</h3><p>Timed Challenge</p></div>
                <div class="home-box" onclick="alert('no advert yet, place yours now.')"><i class="fa-solid fa-speaker"></i><h3> Ads here</h3><p> check out sponsored post</p></div>
                <div class="home-box" onclick="window.open('https://wa.me/2348079558310')"><i class="fa-solid fa-code"></i><h3>Contact Dev</h3><p>Direct WhatsApp</p></div>
                <div class="home-box" onclick="alert('System log updated.')"><i class="fa-solid fa-bug"></i><h3>Report Issue</h3><p>Found an error?</p></div>
            </div>
        `;
        return;
    }

    if (!state.course) {
        root.innerHTML = `
            <div class="card">
                <button class="btn btn-secondary" style="margin-bottom:25px" onclick="goHome()"><i class="fa-solid fa-arrow-left"></i> Back</button>
                <div class="home-grid">
                    ${Object.keys(QUESTIONS_DATA).map(c => `
                        <div class="home-box" onclick="selectCourse('${c}')">
                            <i class="fa-solid fa-book-open"></i>
                            <h3>${c}</h3>
                            <p>${QUESTIONS_DATA[c].length} Modules</p>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;
        return;
    }

    let q = state.shuffled[state.index];
    let progress = (Object.keys(state.answers).length / state.shuffled.length) * 100;

    root.innerHTML = `
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <button class="btn btn-secondary" onclick="goHome()"><i class="fa-solid fa-house"></i> Exit</button>
                <div id="timer-display" style="font-weight:800; font-size:20px; font-family:monospace; color:var(--red); text-shadow: 0 0 10px rgba(239, 68, 68, 0.3);"></div>
            </div>
            <div class="progress-container">
                <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
            </div>
            <h3 class="question-text">${state.index + 1}. ${q.q}</h3>
            <div class="options">
                ${q.o.map((opt, i) => {
                    let cls = "";
                    if (state.answers[state.index] !== undefined) {
                        if (i === q.a) cls = 'correct';
                        else if (i === state.answers[state.index]) cls = 'wrong';
                    }
                    return `<button class="${cls}" onclick="answer(${i})"><span style="margin-right:15px; opacity:0.5">${String.fromCharCode(65+i)}.</span> ${opt}</button>`;
                }).join('')}
            </div>
            ${state.mode === 'learning' && state.answers[state.index] !== undefined ? `<div class="explain"><b>💡 Insight:</b> ${q.exp}</div>` : ''}
            <div style="display:flex; justify-content:space-between; margin-top:30px; gap:15px">
                <button class="btn btn-secondary" style="flex:1" onclick="state.index=Math.max(0,state.index-1);render()" ${state.index===0?'disabled':''}><i class="fa-solid fa-chevron-left"></i> Previous</button>
                ${state.index === state.shuffled.length - 1 ? `<button class="btn" style="flex:1" onclick="finish()">Submit <i class="fa-solid fa-check-double"></i></button>` : `<button class="btn" style="flex:1" onclick="state.index++;render()">Next <i class="fa-solid fa-chevron-right"></i></button>`}
            </div>
            <div class="palette">
                ${state.shuffled.map((_, i) => `<button onclick="state.index=${i};render()" class="${state.answers[i] !== undefined ? 'done' : ''} ${state.index === i ? 'current' : ''}">${i+1}</button>`).join('')}
            </div>
        </div>
    `;
}

setInterval(() => {
    if (state.mode === 'exam' && state.endTime) {
        const diff = state.endTime - Date.now();
        const display = document.getElementById('timer-display');
        if (display && diff > 0) {
            let s = Math.floor(diff / 1000);
            let m = Math.floor(s / 60);
            s %= 60;
            display.innerText = `${m}:${s.toString().padStart(2,'0')}`;
            if(m < 1) display.style.color = 'var(--red)'; else display.style.color = 'var(--text)';
        } else if (diff <= 0) finish();
    }
}, 1000);

function runConfetti() {
    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    let particles = Array.from({ length: 150 }).map(() => ({
        x: Math.random() * canvas.width, y: canvas.height + 10,
        r: Math.random() * 7 + 3, dx: (Math.random() - 0.5) * 12,
        dy: Math.random() * -25 - 7, color: `hsl(${Math.random() * 360}, 80%, 60%)`
    }));
    function anim() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        particles.forEach(p => { p.x+=p.dx; p.y+=p.dy; p.dy+=0.35; ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.fill(); });
        particles = particles.filter(p => p.y < canvas.height + 50);
        if(particles.length > 0) requestAnimationFrame(anim);
    }
    anim();
}

render();
</script>
<script>
function updateViews() {
    const display = document.getElementById('view-number');
    
    // 1. Set your "Project Launch" date (April 1st, 2026)
    const launchDate = new Date('2026-04-01T00:00:00');
    const now = new Date();
    
    // 2. Calculate the difference in milliseconds
    const diffInMs = now - launchDate;
    
    // 3. Convert to 30-minute blocks (1,800,000 ms = 30 mins)
    const thirtyMinBlocks = Math.floor(diffInMs / 1800000);
    
    // 4. Base (72) + 3 views for every 30 mins passed
    const calculatedViews = 72 + (thirtyMinBlocks * 3);
    
    // 5. Update the UI with a clean, comma-separated number
    display.innerText = calculatedViews.toLocaleString();
}

// Run it immediately
updateViews();

// Optional: Update the number live while the user stays on the page
setInterval(updateViews, 60000); // Checks every minute
</script>
